<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Creators — SilqueFans</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1NPB5Q7NTE"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-1NPB5Q7NTE');</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0d0b0f;color:#f5f0e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
  a{color:inherit;text-decoration:none;}
  nav{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 2.5rem;border-bottom:0.5px solid rgba(201,116,122,0.2);position:sticky;top:0;background:#0d0b0f;z-index:100;}
  .logo{font-size:1.4rem;font-weight:300;letter-spacing:0.14em;font-family:Georgia,serif;}
  .logo span{color:#c9747a;}
  .nav-links{display:flex;gap:1.25rem;align-items:center;}
  .nav-btn{border:0.5px solid #c9747a;padding:0.45rem 1.1rem;font-size:11px;letter-spacing:0.1em;color:#c9747a;text-transform:uppercase;cursor:pointer;background:transparent;font-family:inherit;transition:all 0.2s;}
  .nav-btn:hover{background:#c9747a;color:#0d0b0f;}
  .nav-link{font-size:12px;color:rgba(245,240,232,0.4);}
  .hero{padding:3rem 2.5rem 2rem;max-width:900px;margin:0 auto;}
  .hero-title{font-family:Georgia,serif;font-size:2rem;font-weight:300;margin-bottom:0.5rem;}
  .hero-sub{font-size:14px;color:rgba(245,240,232,0.4);margin-bottom:2rem;}
  .search-bar{display:flex;gap:0.75rem;margin-bottom:2rem;}
  .search-input{flex:1;background:rgba(245,240,232,0.05);border:0.5px solid rgba(201,116,122,0.2);color:#f5f0e8;padding:0.75rem 1rem;font-size:14px;font-family:inherit;outline:none;max-width:400px;}
  .search-input:focus{border-color:#c9747a;}
  .search-input::placeholder{color:rgba(245,240,232,0.25);}
  .main{max-width:900px;margin:0 auto;padding:0 2.5rem 3rem;}
  .section-label{font-size:10px;text-transform:uppercase;letter-spacing:0.2em;color:rgba(245,240,232,0.25);margin-bottom:1.5rem;}
  .creator-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;}
  .creator-card{border:0.5px solid rgba(201,116,122,0.15);padding:1.5rem;cursor:pointer;transition:border-color 0.2s;text-decoration:none;display:block;}
  .creator-card:hover{border-color:rgba(201,116,122,0.4);}
  .card-top{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;}
  .card-avatar{width:48px;height:48px;border-radius:50%;background:rgba(201,116,122,0.2);display:flex;align-items:center;justify-content:center;font-size:1.25rem;color:#c9747a;font-family:Georgia,serif;flex-shrink:0;}
  .card-name{font-family:Georgia,serif;font-size:1rem;font-weight:300;margin-bottom:0.2rem;}
  .card-username{font-size:12px;color:rgba(245,240,232,0.35);}
  .card-bio{font-size:12px;color:rgba(245,240,232,0.45);line-height:1.6;margin-bottom:1rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .card-footer{display:flex;justify-content:space-between;align-items:center;}
  .card-price{font-size:12px;color:#c9a96e;}
  .card-posts{font-size:11px;color:rgba(245,240,232,0.25);}
  .loading{display:flex;align-items:center;justify-content:center;min-height:40vh;}
  .spinner{width:28px;height:28px;border:1.5px solid rgba(201,116,122,0.2);border-top-color:#c9747a;border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .empty{text-align:center;padding:4rem 2rem;color:rgba(245,240,232,0.2);font-size:13px;font-style:italic;font-family:Georgia,serif;}
  @media(max-width:600px){
    nav{padding:1rem 1.25rem;}
    .hero{padding:2rem 1.25rem 1rem;}
    .main{padding:0 1.25rem 2rem;}
    .creator-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Silque<span>Fans</span></a>
  <div class="nav-links">
    <span class="nav-link" id="nav-user"></span>
    <button class="nav-btn" id="nav-action" onclick="navAction()">Sign in</button>
  </div>
</nav>
<div class="hero">
  <h1 class="hero-title">Explore creators.</h1>
  <p class="hero-sub">Support the voices the payment processors won't touch.</p>
  <div class="search-bar">
    <input class="search-input" type="text" id="search" placeholder="Search creators..." oninput="filterCreators()">
  </div>
</div>
<div class="main">
  <div class="loading" id="loading"><div class="spinner"></div></div>
  <div id="grid-container" style="display:none;">
    <div class="section-label" id="grid-label">All creators</div>
    <div class="creator-grid" id="creator-grid"></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://xeymbpxllgxyxzwsypcp.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhleW1icHhsbGd4eXh6d3N5cGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTM4MDksImV4cCI6MjA5Mjk2OTgwOX0.c8waNscMcRRupYRiDdcDBRra4nJPiFudvYaOiauAVp0';
const _sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let allCreators=[];
function navAction(){const u=document.getElementById('nav-user').textContent;window.location.href=u?'/dashboard.html':'/login.html';}
function renderGrid(creators){
  const grid=document.getElementById('creator-grid');
  const label=document.getElementById('grid-label');
  label.textContent=creators.length+' creator'+(creators.length!==1?'s':'');
  if(!creators.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1;">No creators found.</div>';return;}
  grid.innerHTML=creators.map(c=>{
    const initial=(c.display_name||c.username||'?')[0].toUpperCase();
    const bio=c.bio?c.bio.substring(0,100):'Independent creator on SilqueFans.';
    return`<a class="creator-card" href="/creator.html?u=${c.username}">
      <div class="card-top">
        <div class="card-avatar">${initial}</div>
        <div><div class="card-name">${c.display_name||c.username}</div><div class="card-username">@${c.username}</div></div>
      </div>
      <div class="card-bio">${bio}</div>
      <div class="card-footer"><span class="card-price">$${c.subscription_price||'9.99'}/mo</span><span class="card-posts">${c.post_count||0} posts</span></div>
    </a>`;
  }).join('');
}
function filterCreators(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  if(!q){renderGrid(allCreators);return;}
  renderGrid(allCreators.filter(c=>(c.display_name||'').toLowerCase().includes(q)||(c.username||'').toLowerCase().includes(q)||(c.bio||'').toLowerCase().includes(q)));
}
async function init(){
  const{data:{session}}=await _sb.auth.getSession();
  if(session){document.getElementById('nav-user').textContent='@'+(session.user.email?.split('@')[0]||'');document.getElementById('nav-action').textContent='Dashboard';}
  const{data:creators}=await _sb.from('profiles').select('*').eq('account_type','creator').eq('is_suspended',false).order('created_at',{ascending:false});
  allCreators=creators||[];
  document.getElementById('loading').style.display='none';
  document.getElementById('grid-container').style.display='block';
  renderGrid(allCreators);
}
init();
</script>
</body>
</html>
