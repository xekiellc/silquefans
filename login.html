<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — SilqueFans</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0d0b0f;color:#f5f0e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
  a{color:inherit;text-decoration:none;}
  nav{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 2.5rem;border-bottom:0.5px solid rgba(201,116,122,0.2);}
  .logo{font-size:1.4rem;font-weight:300;letter-spacing:0.14em;font-family:Georgia,serif;}
  .logo span{color:#c9747a;}
  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
  .card{width:100%;max-width:420px;}
  .card-title{font-family:Georgia,serif;font-size:1.75rem;font-weight:300;margin-bottom:0.5rem;}
  .card-sub{font-size:13px;color:rgba(245,240,232,0.45);margin-bottom:2rem;line-height:1.6;}
  .field{margin-bottom:1.25rem;}
  .field label{display:block;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(245,240,232,0.45);margin-bottom:0.5rem;}
  .field input{width:100%;background:rgba(245,240,232,0.06);border:0.5px solid rgba(201,116,122,0.25);color:#f5f0e8;padding:0.85rem 1rem;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
  .field input:focus{border-color:#c9747a;}
  .field input::placeholder{color:rgba(245,240,232,0.25);}
  .btn{width:100%;background:#c9747a;color:#0d0b0f;border:none;padding:0.9rem;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;font-family:inherit;font-weight:500;transition:background 0.2s;margin-top:0.5rem;}
  .btn:hover{background:#e8a0a5;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;}
  .divider-line{flex:1;height:0.5px;background:rgba(245,240,232,0.1);}
  .divider-text{font-size:11px;color:rgba(245,240,232,0.25);letter-spacing:0.08em;}
  .link-row{text-align:center;font-size:13px;color:rgba(245,240,232,0.35);margin-top:1.5rem;}
  .link-row a{color:#c9747a;}
  .error-msg{background:rgba(201,116,122,0.1);border:0.5px solid rgba(201,116,122,0.4);color:#e8a0a5;padding:0.75rem 1rem;font-size:13px;margin-bottom:1rem;display:none;}
  .success-msg{background:rgba(201,169,110,0.1);border:0.5px solid rgba(201,169,110,0.4);color:#c9a96e;padding:0.75rem 1rem;font-size:13px;margin-bottom:1rem;display:none;}
  footer{padding:1.5rem 2.5rem;border-top:0.5px solid rgba(201,116,122,0.1);text-align:center;}
  .footer-logo{font-family:Georgia,serif;font-size:0.9rem;font-weight:300;letter-spacing:0.12em;color:rgba(245,240,232,0.2);}
  .footer-logo span{color:rgba(201,116,122,0.4);}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Silque<span>Fans</span></a>
  <a href="/signup.html" style="font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(245,240,232,0.45);">Create account</a>
</nav>

<div class="main">
  <div class="card">
    <h1 class="card-title">Welcome back.</h1>
    <p class="card-sub">Sign in to your SilqueFans account.</p>
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="login-btn" onclick="handleLogin()">Sign in</button>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>
    <div class="link-row">Don't have an account? <a href="/signup.html">Sign up</a></div>
    <div class="link-row" style="margin-top:0.75rem;">
      <a href="#" style="color:rgba(245,240,232,0.3);font-size:12px;">Forgot password?</a>
    </div>
  </div>
</div>

<footer><div class="footer-logo">Silque<span>Fans</span></div></footer>

<script>
const SUPABASE_URL='https://xeymbpxllgxyxzwsypcp.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhleW1icHhsbGd4eXh6d3N5cGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTM4MDksImV4cCI6MjA5Mjk2OTgwOX0.c8waNscMcRRupYRiDdcDBRra4nJPiFudvYaOiauAVp0';
const _sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

function showError(msg){
  const el=document.getElementById('error-msg');
  el.textContent=msg;el.style.display='block';
  document.getElementById('success-msg').style.display='none';
}
function showSuccess(msg){
  const el=document.getElementById('success-msg');
  el.textContent=msg;el.style.display='block';
  document.getElementById('error-msg').style.display='none';
}

async function handleLogin(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('login-btn');
  if(!email||!password){showError('Please enter your email and password.');return;}
  btn.disabled=true;btn.textContent='Signing in...';
  const{data,error}=await _sb.auth.signInWithPassword({email,password});
  if(error){showError(error.message);btn.disabled=false;btn.textContent='Sign in';return;}
  showSuccess('Signed in. Redirecting...');
  setTimeout(()=>{window.location.href='/dashboard.html';},1000);
}

document.addEventListener('keydown',function(e){if(e.key==='Enter')handleLogin();});

_sb.auth.getSession().then(({data:{session}})=>{
  if(session)window.location.href='/dashboard.html';
});
</script>
</body>
</html>
