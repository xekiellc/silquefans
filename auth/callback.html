<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SilqueFans — Confirming your account...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0d0b0f;color:#f5f0e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .logo{font-size:1.4rem;font-weight:300;letter-spacing:0.14em;font-family:Georgia,serif;margin-bottom:2rem;}
  .logo span{color:#c9747a;}
  .status{text-align:center;max-width:380px;}
  .status-title{font-family:Georgia,serif;font-size:1.5rem;font-weight:300;margin-bottom:0.75rem;}
  .status-sub{font-size:13px;color:rgba(245,240,232,0.45);line-height:1.7;}
  .spinner{width:32px;height:32px;border:1.5px solid rgba(201,116,122,0.2);border-top-color:#c9747a;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1.5rem;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-state{display:none;}
  .error-state .status-title{color:#e8a0a5;}
  .btn{display:inline-block;margin-top:1.5rem;border:0.5px solid #c9747a;padding:0.6rem 1.5rem;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#c9747a;text-decoration:none;transition:all 0.2s;}
  .btn:hover{background:#c9747a;color:#0d0b0f;}
</style>
</head>
<body>

<div class="logo">Silque<span>Fans</span></div>

<div class="status" id="loading-state">
  <div class="spinner"></div>
  <h1 class="status-title">Confirming your account...</h1>
  <p class="status-sub">Just a moment while we verify your email.</p>
</div>

<div class="status error-state" id="error-state">
  <h1 class="status-title">Something went wrong.</h1>
  <p class="status-sub" id="error-text">This confirmation link may have expired. Please try signing up again.</p>
  <a href="/signup.html" class="btn">Back to signup</a>
</div>

<script>
const SUPABASE_URL='https://xeymbpxllgxyxzwsypcp.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhleW1icHhsbGd4eXh6d3N5cGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczOTM4MDksImV4cCI6MjA5Mjk2OTgwOX0.c8waNscMcRRupYRiDdcDBRra4nJPiFudvYaOiauAVp0';
const _sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

async function handleCallback(){
  const hashParams=new URLSearchParams(window.location.hash.substring(1));
  const searchParams=new URLSearchParams(window.location.search);
  const accessToken=hashParams.get('access_token');
  const refreshToken=hashParams.get('refresh_token');
  const errorParam=searchParams.get('error')||hashParams.get('error');
  const errorDescription=searchParams.get('error_description')||hashParams.get('error_description');
  if(errorParam){
    document.getElementById('loading-state').style.display='none';
    document.getElementById('error-state').style.display='block';
    document.getElementById('error-text').textContent=errorDescription||'Confirmation failed. Please try again.';
    return;
  }
  if(accessToken){
    const{data,error}=await _sb.auth.setSession({access_token:accessToken,refresh_token:refreshToken});
    if(error){document.getElementById('loading-state').style.display='none';document.getElementById('error-state').style.display='block';return;}
    if(data.session){window.location.href='/dashboard.html';return;}
  }
  const{data:{session},error}=await _sb.auth.getSession();
  if(session){window.location.href='/dashboard.html';return;}
  document.getElementById('loading-state').style.display='none';
  document.getElementById('error-state').style.display='block';
}

handleCallback();
</script>
</body>
</html>
